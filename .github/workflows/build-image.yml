name: Create docker image and push it to the registry

on:
  push:
    branches: [main]
  workflow_dispatch:
env:

  BACKEND_IMAGE_TAG: ${{ vars.DOCKERHUB_USERNAME }}/chat-app-backend
  FRONTEND_IMAGE_TAG: ${{ vars.DOCKERHUB_USERNAME }}/chat-app-frontend
jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to dockerhub 
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get part of secret
        run: |
          echo ${MY_SECRET::8}   # works here
          echo ${MY_SECRET:9}   # works here
        env:
          MY_SECRET: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get part of secret global <- secret
        run: |
          echo ${{ secrets.REVEALABLE_SECRET }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: "./backend"
          push: true
          tags: ${{ env.BACKEND_IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to dockerhub 
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: "./frontend"
          push: true
          tags: ${{ env.FRONTEND_IMAGE_TAG }}
          build-args: |
            VITE_BASE_API=http://${{ secrets.EC2_HOST }}:${{ secrets.PORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SOURCE: "docker-compose.yaml"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ vars.REMOTE_USER }}
          TARGET: /home/ec2-user
          SCRIPT_BEFORE: |
            whoami
            ls -al
          SCRIPT_AFTER: |
            cat <<EOF > .env
            BACKEND_IMAGE_TAG=${{ env.BACKEND_IMAGE_TAG }}
            FRONTEND_IMAGE_TAG=${{ env.FRONTEND_IMAGE_TAG }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            PORT=${{ secrets.PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            EOF
            env
            docker compose up -d --pull=always
