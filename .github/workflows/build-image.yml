name: Create docker image and push it to the registry
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  BACKEND_IMAGE_TAG: ${{ vars.DOCKERHUB_USERNAME }}/chat-app-backend
  FRONTEND_IMAGE_TAG: ${{ vars.DOCKERHUB_USERNAME }}/chat-app-frontend
jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to dockerhub 
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: "{{defaultContext}}:backend"
          push: true
          tags: ${{ env.BACKEND_IMAGE_TAG }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to dockerhub 
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: "{{defaultContext}}:frontend"
          push: true
          tags: ${{ env.FRONTEND_IMAGE_TAG }}
          build-args: |
            VITE_BASE_API=http://${{ secrets.EC2_HOST }}:${{ secrets.PORT }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SOURCE: "docker-compose.yaml"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ vars.REMOTE_USER }}
          TARGET: /home/ec2-user
          SCRIPT_BEFORE: |
            whoami
            ls -al
          SCRIPT_AFTER: |
            export BACKEND_IMAGE_TAG=${{ env.BACKEND_IMAGE_TAG }}
            export FRONTEND_IMAGE_TAG=${{ env.FRONTEND_IMAGE_TAG }}
            export MONGODB_URI=${{ secrets.MONGODB_URI }}
            export PORT=${{ secrets.PORT }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export NODE_ENV=${{ secrets.NODE_ENV }}
            export CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            export CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            export CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            env
            docker compose up -d --pull=always
