services:
  frontend:
    build: ${FRONTEND_IMAGE_TAG}
    ports:
      - "5173:5173"
  
  backend:
    build: ${BACKEND_IMAGE_TAG}
    ports:
      - "${PORT}:${PORT}"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - PORT=${PORT}
      - JWT_SECRE=${JWT_SECRE}
      - NODE_EN=${NODE_EN}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
